{% extends "home/base_admin.html" %}
{% block admin_page_title %}Withdrawal approval{% endblock %}
{% block staff_nav_title %}Admin{% endblock %}
{% block admin_main %}
<div class="admin-back-row">
  <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">← Overview</a>
</div>
<div class="admin-page-card">
  <h1 class="h4 mb-4">Withdrawal request</h1>
  <form id="approveForm" method="post" action="{% url 'approve_withdraw' withdrawal.user.id %}">
    {% csrf_token %}
    <div class="mb-3">
      <label for="requestedAmount" class="form-label">Requested withdrawal amount</label>
      <input type="text" class="form-control" id="requestedAmount" value="${{ withdrawal.amount }}" disabled>
    </div>
    <div class="mb-3">
      <label for="walletAddress" class="form-label">Wallet address</label>
      <input type="text" class="form-control" id="walletAddress" value="{{ kyc.wallet_address }}" disabled>
    </div>
    <div class="mb-3">
      <label for="approveAmount" class="form-label">Amount to approve</label>
      <input type="number" class="form-control" id="approveAmount" name="approved_amount" placeholder="Enter amount to approve" required>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
      <button type="submit" class="btn btn-primary" data-mh-confirm="Approve this withdrawal for the amount you entered? This will mark the withdrawal as processed.">Approve withdrawal</button>
      <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
