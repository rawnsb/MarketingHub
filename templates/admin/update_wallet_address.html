{% extends "home/base_admin.html" %}
{% block admin_page_title %}Wallet addresses{% endblock %}
{% block staff_nav_title %}Admin{% endblock %}
{% block admin_main %}
<div class="admin-back-row">
  <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">← Overview</a>
</div>
<div class="admin-page-card">
  <h1 class="h4 mb-4">Wallet address management</h1>
  <form method="post" action="{% url 'update_wallet' user.id %}">
    {% csrf_token %}
    <div class="mb-4">
      <label for="currentDepositAddress" class="form-label">Current deposit wallet address</label>
      <input type="text" class="form-control" id="currentDepositAddress" value="{{ wallet_address.address }}" disabled>
    </div>
    <div class="mb-3">
      <label for="newDepositAddress" class="form-label">New deposit wallet address</label>
      <input type="text" class="form-control" id="newDepositAddress" name="newAddress" placeholder="Enter new address">
    </div>
    <button type="submit" class="btn btn-primary mb-4">Save and replace</button>
  </form>
  <hr class="my-4">
  <div class="mb-3">
    <label for="withdrawalAddress" class="form-label">Withdrawal wallet address (from KYC)</label>
    <input type="text" class="form-control" id="withdrawalAddress" value="{{ withdrawal_address }}" readonly>
  </div>
  <button type="button" class="btn btn-outline-primary btn-sm" id="copyWithdrawBtn">Copy withdrawal address</button>
</div>
{% endblock %}
{% block admin_extra_js %}
<script>
  (function () {
    var btn = document.getElementById("copyWithdrawBtn");
    if (!btn) return;
    btn.addEventListener("click", function () {
      var el = document.getElementById("withdrawalAddress");
      if (!el) return;
      navigator.clipboard.writeText(el.value).then(function () {
        btn.textContent = "Copied";
        setTimeout(function () { btn.textContent = "Copy withdrawal address"; }, 2000);
      });
    });
  })();
</script>
{% endblock %}
