{% extends "home/base_admin.html" %}
{% block admin_page_title %}Deposit verification{% endblock %}
{% block staff_nav_title %}Admin{% endblock %}
{% block admin_main %}
<div class="admin-back-row">
  <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">← Overview</a>
</div>
<div class="admin-page-card">
  <h1 class="h4 mb-4">Deposit verification</h1>
  <form id="verifyForm" method="post" action="{% url 'update_deposit' deposit.user.id %}">
    {% csrf_token %}
    <div class="mb-3">
      <label for="walletAddress" class="form-label">Generated wallet address</label>
      <input type="text" class="form-control" id="walletAddress" value="{{ deposit.wallet_address }}" disabled>
    </div>
    <div class="mb-3">
      <label for="requestedAmount" class="form-label">Requested deposit amount</label>
      <input type="number" class="form-control" id="requestedAmount" value="{{ deposit.deposited_amount }}" disabled>
    </div>
    <div class="mb-3">
      <label for="depositMethod" class="form-label">Deposit method</label>
      <input type="text" class="form-control" id="depositMethod" name="deposit_method" value="{{ deposit.deposit_method }}" disabled>
    </div>
    <div class="mb-3">
      <label for="actualDeposited" class="form-label">Actual deposited amount</label>
      <input type="number" class="form-control" id="actualDeposited" name="deposited_amount" placeholder="Confirm amount received" required>
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
      <button type="button" class="btn btn-primary" onclick="document.getElementById('verifyForm').submit();">Verify and save</button>
      <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
