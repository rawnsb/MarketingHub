{% extends "home/base_admin.html" %}
{% block admin_page_title %}KYC verification{% endblock %}
{% block staff_nav_title %}Admin{% endblock %}
{% block admin_main %}
<div class="admin-back-row">
  <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">← Overview</a>
</div>
<div class="admin-page-card admin-page-card--wide">
  <h1 class="h4 mb-4">KYC verification</h1>
  <form id="kycForm" method="post" action="{% url 'verify_kyc' kyc_record.user.id %}">
    {% csrf_token %}
    <div class="mb-4">
      <label class="form-label d-block">ID card front</label>
      <img src="{{ kyc_record.id_card_front.url }}" class="img-fluid rounded border" style="max-height: 220px; width: auto;" alt="ID card front">
    </div>
    <div class="mb-4">
      <label class="form-label d-block">ID card back</label>
      <img src="{{ kyc_record.id_card_back.url }}" class="img-fluid rounded border" style="max-height: 220px; width: auto;" alt="ID card back">
    </div>
    <div class="mb-4">
      <label class="form-label d-block">Facial recognition video</label>
      <video src="{{ kyc_record.face_video.url }}" class="w-100 rounded border" style="max-width: 28rem;" controls></video>
    </div>
    <div class="mb-3">
      <label class="form-label">Crypto type</label>
      <p class="mb-0 fw-semibold text-uppercase">{{ kyc_record.wallet_type }}</p>
    </div>
    <div class="mb-4">
      <label class="form-label">Wallet address</label>
      <p class="mb-0 font-monospace small">{{ kyc_record.wallet_address }}</p>
    </div>
    <div class="d-flex flex-wrap gap-2">
      <button class="btn btn-primary" type="submit" name="action" value="verify">Verify</button>
      <button class="btn btn-outline-danger" type="submit" name="action" value="delete" data-mh-confirm="Delete this KYC record for __MH_SUBJECT__? This cannot be undone." data-mh-confirm-subject="{{ kyc_record.user.username }}" data-mh-confirm-ok="Delete">Delete</button>
      <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
