{% extends "home/base_admin.html" %}
{% block admin_page_title %}Telegram link{% endblock %}
{% block staff_nav_title %}Admin{% endblock %}
{% block admin_main %}
<div class="admin-back-row">
  <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary btn-sm">← Overview</a>
</div>
<div class="admin-page-card">
  <h1 class="h4 mb-4">Customer service Telegram link</h1>
  <form method="post" action="{% url 'update_telegram' user.id %}">
    {% csrf_token %}
    <div class="mb-3">
      <label for="currentLink" class="form-label">Current Telegram link</label>
      <input type="url" class="form-control" id="currentLink" value="{{ telegram_account.telegram_link }}" disabled>
    </div>
    <div class="mb-3">
      <label for="newLink" class="form-label">New Telegram link</label>
      <input type="url" class="form-control" id="newLink" name="newLink" placeholder="https://t.me/…">
    </div>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
      <button type="submit" class="btn btn-primary">Save and replace</button>
      <a href="{% url 'Admin_dashboard' %}" class="btn btn-outline-secondary">Back to overview</a>
    </div>
  </form>
</div>
{% endblock %}
