{% if messages %}
<div
  class="message-stack {{ message_stack_class|default:'mt-3' }}"
  id="{{ message_stack_id|default:'message-container' }}"
  {% if message_stack_live %}role="status" aria-live="polite"{% endif %}
  data-auto-dismiss-ms="{{ message_auto_dismiss_ms|default:'7000' }}"
>
  {% for message in messages %}
  <div
    class="alert alert-dismissible fade show alert-{% if 'error' in message.tags %}danger{% elif 'success' in message.tags %}success{% elif 'warning' in message.tags %}warning{% elif 'info' in message.tags or 'debug' in message.tags %}info{% else %}secondary{% endif %}"
    role="alert"
  >
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  {% endfor %}
</div>
<script>
(function () {
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".message-stack[data-auto-dismiss-ms]").forEach(function (stack) {
      var ms = parseInt(stack.getAttribute("data-auto-dismiss-ms"), 10);
      if (!ms || typeof bootstrap === "undefined") return;
      stack.querySelectorAll(".alert").forEach(function (el) {
        window.setTimeout(function () {
          try {
            bootstrap.Alert.getOrCreateInstance(el).close();
          } catch (e) {
            el.classList.remove("show");
            el.addEventListener("transitionend", function () { el.remove(); }, { once: true });
          }
        }, ms);
      });
    });
  });
})();
</script>
{% endif %}
