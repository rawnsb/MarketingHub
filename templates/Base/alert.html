{% if messages %}
<style>
    .alert-info { background-color: #d9edf7; color: #31708f; } /* Default style for info */
    .alert-success { background-color: #dff0d8; color: #3c763d; } /* Default style for success */
    .alert-warning { background-color: #fcf8e3; color: #8a6d3b; } /* Default style for warning */
    .alert-danger { background-color: #f2dede; color: #a94442; } /* Default style for error */
</style>

<div class="mt-3" id="message-container">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %}" role="alert">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    const messageContainer = document.getElementById('message-container');
    if (messageContainer) {
        setTimeout(() => {
            messageContainer.style.display = 'none';
        }, 3000);  // 3000 milliseconds = 3 seconds
    }
});
</script>
