{% extends "accounts/base_login.html" %}
{% block login_title %}Customer login{% endblock %}
{% block login_heading %}<h2 class="h4 mb-0">Login</h2>{% endblock %}
{% block login_body %}
<form action="{% url 'login' %}" method="post" novalidate>
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label" for="username">Username</label>
    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
  </div>
  <input type="hidden" name="role" value="1">
  <div class="mb-3">
    <label class="form-label" for="password">Password</label>
    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="rememberMe" name="rememberMe">
    <label class="form-check-label" for="rememberMe">Remember me</label>
  </div>
  <button type="submit" class="btn btn-auth-primary w-100">Login</button>
</form>
{% endblock %}
{% block login_footer %}
<div class="card-footer text-center pb-4 px-4">
  <a href="#" class="text-decoration-none">Forgot password?</a>
  <span class="text-muted"> · </span>
  <a href="{% url 'register' %}" class="text-decoration-none">Sign up</a>
</div>
{% endblock %}
