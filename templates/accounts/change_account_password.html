{% extends "accounts/base_login.html" %}
{% block login_title %}Change password{% endblock %}
{% block login_heading %}<h2 class="h4 mb-0">Change Your Password</h2>{% endblock %}
{% block login_body %}
{% include "Base/alert.html" %}
<form method="post" action="{% url 'change_account_password' %}" novalidate>
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label" for="current_password">Current Password</label>
    <div class="input-group">
      <input type="password" class="form-control" id="current_password" name="current_password" placeholder="Enter your current password" autocomplete="current-password" required>
      <button type="button" class="btn btn-outline-secondary" id="toggleCurrentPassword" aria-label="Show current password"><i class="fas fa-eye" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label" for="new_password">New Password</label>
    <div class="input-group">
      <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Choose a strong new password" autocomplete="new-password" required>
      <button type="button" class="btn btn-outline-secondary" id="toggleNewPassword" aria-label="Show new password"><i class="fas fa-eye" aria-hidden="true"></i></button>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label" for="confirm_password">Confirm New Password</label>
    <div class="input-group">
      <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-enter the new password" autocomplete="new-password" required>
      <button type="button" class="btn btn-outline-secondary" id="toggleConfirmPassword" aria-label="Show confirm password"><i class="fas fa-eye" aria-hidden="true"></i></button>
    </div>
  </div>
  <button type="submit" class="btn btn-auth-primary w-100">Change Password</button>
</form>
{% endblock %}
{% block login_extra_js %}
<script>
  function wireToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener("click", function () {
      const input = document.getElementById(inputId);
      const icon = this.querySelector("i");
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
      }
    });
  }
  wireToggle("toggleCurrentPassword", "current_password");
  wireToggle("toggleNewPassword", "new_password");
  wireToggle("toggleConfirmPassword", "confirm_password");
</script>
{% endblock %}
