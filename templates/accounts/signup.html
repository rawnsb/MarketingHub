
{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(45deg, #ff6f61, #ffcc33, #34e89e, #0f3443);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: #fff;
        font-family: "Arial", sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .card {
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        animation: slideUp 1s ease-out;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
      }

      @keyframes slideUp {
        from {
          transform: translateY(100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .logo {
        width: 100px;
        margin-bottom: 10px;
      }

      .customer-service {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      .customer-service img {
        width: 50px;
        transition: transform 0.3s, opacity 0.3s;
        opacity: 0.8;
      }

      .customer-service img:hover {
        transform: scale(1.2);
        opacity: 1;
      }

      .btn-primary {
        background: #007bff;
        border: none;
        border-radius: 50px;
        padding: 10px 20px;
        transition: background 0.3s;
      }

      .btn-primary:hover {
        background: #0056b3;
      }

      .form-control {
        border-radius: 50px;
        padding: 10px 20px;
        border: 1px solid #ddd;
        transition: all 0.3s;
      }

      .form-control:focus {
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
      }

      .card-header,
      .card-footer {
        background: transparent;
        border: none;
      }

      .card-header h2 {
        color: #333;
      }

      .form-group label {
        color: #333;
      }

      .card-footer a {
        color: #007bff;
        text-decoration: none;
        transition: color 0.3s;
      }

      .card-footer a:hover {
        color: #0056b3;
      }
      .card-center {
        margin-top: 100px; /* Adjust this value to set the desired margin from the top */
      }
    </style>
  </head>
  <body>

    <div
      class="container d-flex justify-content-center align-items-center card-center"
    >
      <div class="col-md-6">
        <div class="card">
          <div class="card-header text-center">

            <h2>Sign Up</h2>
            {% include "Base/alert.html" %}
          </div>
          <div class="card-body">
            <form action="{% url 'register' %}" method="post">
              {% csrf_token %}


              <input type="hidden" name="role" value="1" />

              <div class="form-group">
                <label for="username">Username</label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  name="username"
                  placeholder="Enter your username"
                  required
                />
              </div>
              <div class="form-group">
                <label for="email">Email address</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  id="email"
                  placeholder="Enter your email"
                  required
                />
              </div>
              <div class="form-group">
                <label for="inviteCode">Invite Code</label>
                <input
                  type="text"
                  class="form-control"
                  name="inviteCode"
                  id="inviteCode"
                  placeholder="Enter your invite Code"
                  required
                />
              </div>
              <div class="form-group">
                <label for="payment_password">Withdrawal Password</label>
                <input
                  type="number"
                  class="form-control"
                  name="payment_password"
                  id="payment_password"
                  placeholder="4 to 6 digit withdrawal password"
                  required
                />
              </div>
              <div class="form-group">
                <label for="password">Password</label>
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  id="password"
                  placeholder="Enter your password"
                  required
                />
              </div>
              <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                  type="password"
                  class="form-control"
                  name="confirmPassword"
                  id="confirmPassword"
                  placeholder="Confirm your password"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary btn-block">
                Sign Up
              </button>
            </form>
          </div>
          <div class="card-footer text-center">
             <a href="{% url 'login' %}">Already have an account? Login</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
      // Additional JavaScript can be added here for further interactivity or validation if needed
    </script>
  </body>
</html>
