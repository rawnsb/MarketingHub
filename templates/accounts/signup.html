{% extends "accounts/base_login.html" %}
{% block login_title %}Sign up{% endblock %}
{% block login_heading %}<h2 class="h4 mb-0">Sign Up</h2>{% endblock %}
{% block login_body %}
{% include "Base/alert.html" %}
<form action="{% url 'register' %}" method="post" novalidate>
  {% csrf_token %}
  <input type="hidden" name="role" value="1">
  <div class="mb-3">
    <label class="form-label" for="username">Username</label>
    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="email">Email address</label>
    <input type="email" class="form-control" name="email" id="email" placeholder="Enter your email" autocomplete="email" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="inviteCode">Invite Code</label>
    <input type="text" class="form-control" name="inviteCode" id="inviteCode" value="{{ invite_code }}" placeholder="Enter your invite Code" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="payment_password">Withdrawal Password</label>
    <input type="number" class="form-control" name="payment_password" id="payment_password" placeholder="4 to 6 digit withdrawal password" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="password">Password</label>
    <input type="password" class="form-control" name="password" id="password" placeholder="Enter your password" autocomplete="new-password" required>
  </div>
  <div class="mb-3">
    <label class="form-label" for="confirmPassword">Confirm Password</label>
    <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" placeholder="Confirm your password" autocomplete="new-password" required>
  </div>
  <button type="submit" class="btn btn-auth-primary w-100">Sign Up</button>
</form>
{% endblock %}
{% block login_footer %}
<div class="card-footer text-center pb-4 px-4">
  <a href="{% url 'login' %}" class="text-decoration-none">Already have an account? Login</a>
</div>
{% endblock %}
