{% extends "home/base_customer.html" %}
{% block customer_title %}Change Payment Password{% endblock %}
{% block customer_header_title %}Payment password{% endblock %}
{% block content %}
<div class="flow-card" style="max-width: 28rem;">
  <h2 class="h5 text-center mb-4">Change Payment Password</h2>
  {% include "Base/alert.html" %}
  <form method="post" action="{% url 'change_payment_password' %}">
    {% csrf_token %}
    <div class="mb-3">
      <label for="new_password" class="form-label">New Payment Password</label>
      <input type="number" class="form-control" id="new_password" min="0" name="new_password" placeholder="Enter new payment password" required autocomplete="off">
    </div>
    <button type="submit" class="btn btn-primary w-100">Update Password</button>
  </form>
</div>
{% endblock %}
