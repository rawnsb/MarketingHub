<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Service Care</title>
    <link
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f3f4f6; /* Slightly darker light grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: 'Roboto', sans-serif;
      }

      .card {
        width: 320px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        border-radius: 15px;
        overflow: hidden;
        background-color: white;
        transition: transform 0.3s ease;
      }

      .card:hover {
        transform: translateY(-10px);
      }

      .card img {
        width: 100%;
        height: auto;
        border-top-right-radius: 15px;
        border-top-left-radius: 15px;
      }

      .card-body {
        padding: 20px;
        text-align: center;
      }

      .card-title {
        margin-bottom: 15px;
        color: #333;
        font-size: 1.25rem;
        font-weight: 500;
      }

      .btn-primary {
        background-color: #007bff;
        border: none;
        padding: 10px 20px;
        font-size: 1rem;
        border-radius: 5px;
        transition: background-color 0.3s ease, transform 0.3s ease;
      }

      .btn-primary:hover {
        background-color: #0056b3;
        transform: scale(1.05);
      }

      @media (max-width: 768px) {
        .card {
          width: 90%;
        }

        .card-title {
          font-size: 1.15rem;
        }

        .btn-primary {
          padding: 8px 16px;
          font-size: 0.95rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img
        src="https://img.freepik.com/free-photo/woman-working-call-centre_329181-13453.jpg?t=st=1722290567~exp=1722294167~hmac=c55e491cd1a58649f5d7cb4f6f8b5aa50f7b38d5fcd703a3816c740822b0b4a9&w=360"
        alt="Customer Service"
      />
      <div class="card-body">
        <h5 class="card-title">Customer Service</h5>

        <a href="{{ request.user.telegram_account.telegram_link }}" class="btn btn-primary">Send Message</a>
      </div>
    </div>
    
  </body>
</html>
