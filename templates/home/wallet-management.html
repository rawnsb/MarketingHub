<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Management</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #74EBD5 0%, #9FACE6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            animation: fadeIn 1s ease-in-out;
        }

        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            margin: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.75rem;
            font-weight: bold;
            animation: fadeIn 1s ease-in-out;
        }

        h4 {
            color: #333;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 1.25rem;
            font-weight: bold;
            animation: fadeIn 1s ease-in-out;
        }

        .form-group label {
            color: #333;
            font-weight: bold;
            animation: fadeIn 1s ease-in-out;
        }

        .form-control {
            border-radius: 8px;
            padding: 5px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            transition: border-color 0.3s ease;
            animation: fadeIn 1s ease-in-out;
        }

        .form-control:focus {
            border-color: #007bff;
            box-shadow: none;
        }

        .custom-file {
            margin-bottom: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        .custom-file-input {
            border-radius: 8px;
            border: 1px solid #ddd;
            transition: border-color 0.3s ease;
        }

        .custom-file-input:focus ~ .custom-file-label {
            border-color: #007bff;
            box-shadow: none;
        }

        .custom-file-label {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #ddd;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.3s ease;
            animation: fadeIn 1s ease-in-out;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .btn-primary:focus {
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }

        @media (max-width: 576px) {
            .container {
                padding: 30px;
            }

            h2 {
                font-size: 1.5rem;
            }

            h4 {
                font-size: 1.2rem;
            }

            .btn-primary {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Wallet Management</h2>
        {% if request.user.kyc.is_verified %}
        <div class="alert alert-success">
            <strong>Success!</strong> You are verified for withdrawal.
            <br>
    <em>Note:</em> If you want to change your wallet address, please contact customer care.
        </div>

        {% else %}
        <form id="kycForm" action="{% url 'wallet' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <h4>KYC Verification</h4>
            <div class="form-group">
                <label for="idCardFront">ID Card Front</label>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="idCardFront" name="idCardFront" required>
                    <label class="custom-file-label" for="idCardFront">Choose image</label>
                </div>
            </div>
            <div class="form-group">
                <label for="idCardBack">ID Card Back</label>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="idCardBack" name="idCardBack" required>
                    <label class="custom-file-label" for="idCardBack">Choose image</label>
                </div>
            </div>
            <div class="form-group">
                <label for="faceVideo">Face Recognition Video</label>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="faceVideo" name="faceVideo" accept="video/*" capture="camera" required>
                    <label class="custom-file-label" for="faceVideo">Choose video</label>
                </div>
            </div>
            <h4>Withdrawal Account Details</h4>
            <div class="form-group">
                <label for="walletType">Select Wallet Type</label>
                <select class="form-control" id="walletType" name="walletType" required>
                    <option value="">Select</option>
                    <option value="usdt">USDT</option>
                    <option value="solana">Solana</option>
                </select>
            </div>
            <div class="form-group">
                <label for="walletAddress">Wallet Address</label>
                <input type="text" class="form-control" id="walletAddress" name="walletAddress" placeholder="Enter wallet address" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        {% endif %}
    </div>

    <!-- Optional JavaScript -->
    <script>
        // Show the file name when a file is selected
        document.querySelectorAll('.custom-file-input').forEach(input => {
            input.addEventListener('change', function () {
                let fileName = this.files[0].name;
                this.nextElementSibling.innerHTML = fileName;
            });
        });
    </script>
</body>

</html>
