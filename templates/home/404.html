<!-- templates/404.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <link
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f7ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
      }
      .error-code {
        font-size: 10rem;
        font-weight: bold;
        color: #343a40;
      }
      .error-message {
        font-size: 1.5rem;
        color: #343a40;
      }
      .btn-home {
        background: #6f42c1;
        color: #fff;
        padding: 10px 20px;
        border-radius: 5px;
        transition: background 0.3s;
      }
      .btn-home:hover {
        background: #563d7c;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <div class="error-message">
        Sorry, the page you are looking for does not exist.
      </div>
      <a href="/" class="btn btn-home mt-3">Go to Home</a>
    </div>
  </body>
</html>
