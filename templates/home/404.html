{% extends "base.html" %}
{% load static %}
{% block title %}Page not found · MarketingHub{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/theme.css' %}">
<style>
  .error-page { min-height: 70vh; display: flex; align-items: center; justify-content: center; background: #f2f7ff; }
  .error-code { font-size: clamp(4rem, 12vw, 10rem); font-weight: 800; color: #343a40; line-height: 1; }
</style>
{% endblock %}
{% block body %}
<main class="error-page px-3" role="main">
  <div class="text-center">
    <div class="error-code" aria-hidden="true">404</div>
    <p class="lead text-secondary mb-4">Sorry, the page you are looking for does not exist.</p>
    <a href="/" class="btn btn-lg btn-primary rounded-pill px-4">Go to home</a>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
