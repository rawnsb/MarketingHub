{% extends "home/base_customer.html" %}
{% block customer_title %}Deposit{% endblock %}
{% block customer_header_title %}Deposit{% endblock %}
{% block content %}
<div class="flow-card">
  <h2 class="h5 text-center mb-4 pb-2 border-bottom">Deposit</h2>
  <form id="depositForm">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="depositMethod">Select Deposit Method</label>
      <select class="form-select" id="depositMethod" required>
        <option value="">Select</option>
        <option value="usdt" selected>USDT</option>
        <option value="solana">Solana</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label" for="depositAmount">Amount</label>
      <input type="number" class="form-control" min="0" id="depositAmount" placeholder="Enter amount" required>
    </div>
    <button type="button" class="btn btn-primary w-100" onclick="generateWalletAddress()">Generate Wallet Address</button>
  </form>
  <div class="wallet-address hidden" id="walletAddressSection">
    <input type="text" class="form-control" id="walletAddress" readonly>
    <button type="button" class="btn btn-success" onclick="copyToClipboard()">Copy</button>
  </div>
</div>
{% endblock %}
{% block customer_extra_js %}
<script>
  function generateWalletAddress() {
    const depositMethod = document.getElementById('depositMethod').value;
    const depositAmount = document.getElementById('depositAmount').value;
    if (!depositMethod || !depositAmount) {
      alert('Please fill out all fields.');
      return;
    }
    fetch("{% url 'deposite' %}", {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': '{{ csrf_token }}'
      },
      body: JSON.stringify({
        method: depositMethod,
        amount: depositAmount
      })
    })
    .then(response => response.json())
    .then(data => {
      document.getElementById('walletAddress').value = data.walletAddress;
      document.getElementById('walletAddressSection').classList.remove('hidden');
    })
    .catch(error => console.error('Error:', error));
  }
  function copyToClipboard() {
    const walletAddress = document.getElementById('walletAddress');
    walletAddress.select();
    document.execCommand('copy');
    alert('Wallet address copied to clipboard.');
  }
</script>
{% endblock %}
