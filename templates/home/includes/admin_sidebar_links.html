{% comment %}Shared admin primary nav — used in desktop sidebar and mobile offcanvas.{% endcomment %}
<nav aria-label="Admin primary" class="admin-sidebar__nav">
  <ul class="admin-sidebar__list list-unstyled mb-0">
    <li class="admin-sidebar__item">
      <a href="{% url 'Admin_dashboard' %}" class="admin-sidebar__link {% if request.resolver_match.url_name == 'Admin_dashboard' %}is-active{% endif %}" title="Overview">
        <i class="fa-solid fa-gauge-high fa-fw me-2" aria-hidden="true"></i><span class="admin-sidebar__label">Overview</span>
      </a>
    </li>
    <li class="admin-sidebar__item">
      <a href="{% url 'orders_panel' %}" class="admin-sidebar__link {% if request.resolver_match.url_name == 'orders_panel' %}is-active{% endif %}" title="Order panel">
        <i class="fa-solid fa-list fa-fw me-2" aria-hidden="true"></i><span class="admin-sidebar__label">Order panel</span>
      </a>
    </li>
    <li class="admin-sidebar__item">
      <a href="{% url 'delete_unused_products' %}" class="admin-sidebar__link {% if request.resolver_match.url_name == 'delete_unused_products' %}is-active{% endif %}" title="Delete unused prodcts" data-mh-confirm="Permanently delete all unused products from the database? This cannot be undone.">
        <i class="fa-solid fa-broom fa-fw me-2" aria-hidden="true"></i><span class="admin-sidebar__label">Clear Bin</span>
      </a>
    </li>
    <li class="admin-sidebar__item">
      <button type="button" class="admin-sidebar__link admin-sidebar__link--button" data-bs-toggle="modal" data-bs-target="#addEmployeeModal" title="Add employee">
        <i class="fa-solid fa-user-plus fa-fw me-2" aria-hidden="true"></i><span class="admin-sidebar__label">Add employee</span>
      </button>
    </li>
  </ul>
  <hr class="admin-sidebar__divider" role="presentation">
  <ul class="admin-sidebar__list list-unstyled mb-0">
    <li class="admin-sidebar__item">
      <a href="{% url 'logout' %}" class="admin-sidebar__link admin-sidebar__link--muted" title="Log out">
        <i class="fa-solid fa-right-from-bracket fa-fw me-2" aria-hidden="true"></i><span class="admin-sidebar__label">Log out</span>
      </a>
    </li>
  </ul>
</nav>
