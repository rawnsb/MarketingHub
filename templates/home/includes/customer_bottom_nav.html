{% comment %}Bottom nav for customer shell — active state via url_name (no view changes).{% endcomment %}
<nav class="customer-bottom-nav" aria-label="Main navigation">
  <ul class="nav nav-justified w-100 mb-0">
    <li class="nav-item">
      <a class="nav-link py-2{% if request.resolver_match.url_name == 'home' %} active{% endif %}" href="{% url 'home' %}"><i class="fas fa-home" aria-hidden="true"></i>Home</a>
    </li>
    <li class="nav-item">
      <a class="nav-link py-2{% if request.resolver_match.url_name == 'service' %} active{% endif %}" href="{% url 'service' %}"><i class="fas fa-concierge-bell" aria-hidden="true"></i>Service</a>
    </li>
    <li class="nav-item">
      <a class="nav-link py-2{% if request.resolver_match.url_name == 'menu' or request.resolver_match.url_name == 'order_management' or request.resolver_match.url_name == 'grab_order' %} active{% endif %}" href="{% url 'menu' %}"><i class="fas fa-link" aria-hidden="true"></i>Menu</a>
    </li>
    <li class="nav-item">
      <a class="nav-link py-2{% if request.resolver_match.url_name == 'mine' %} active{% endif %}" href="{% url 'mine' %}"><i class="fas fa-user" aria-hidden="true"></i>Mine</a>
    </li>
  </ul>
</nav>
