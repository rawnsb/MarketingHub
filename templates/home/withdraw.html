{% extends "home/base_customer.html" %}
{% block customer_title %}Withdrawal{% endblock %}
{% block customer_header_title %}Withdrawal{% endblock %}
{% block content %}
<div class="flow-card">
  <div id="showWithdraw">
    <h2 class="h5 text-center mb-4 pb-2 border-bottom">Withdrawal</h2>
    <form id="withdrawalForm" method="post">
      <div class="mb-3">
        <label class="visually-hidden" for="withdrawalAmount">Amount</label>
        <input type="number" class="form-control" min="0" id="withdrawalAmount" name="withdrawalAmount" placeholder="Enter amount" required>
      </div>
      <div class="mb-3">
        <label class="visually-hidden" for="withdrawalPassword">Password</label>
        <input type="password" class="form-control" id="withdrawalPassword" name="withdrawalPassword" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-success w-100">Submit</button>
    </form>
  </div>
  <div id="processingMessage" class="hidden">
    <div class="withdraw-timer" id="timer" role="status" aria-live="polite"></div>
    <p class="text-center mt-3 text-muted">Your withdrawal is processing. Please wait...</p>
  </div>
</div>
{% endblock %}
{% block customer_extra_js %}
<script>
  document.getElementById('withdrawalForm').addEventListener('submit', function(event) {
    event.preventDefault();
    var formData = new FormData(this);
    var csrftoken = document.querySelector('meta[name="csrf-token"]').content;
    fetch("{% url 'withdraw' %}", {
      method: 'POST',
      body: formData,
      headers: { "X-CSRFToken": csrftoken }
    }).then(response => response.json()).then(data => {
      if (data.status === 'processing') {
        document.getElementById('processingMessage').classList.remove('hidden');
        document.getElementById('showWithdraw').classList.add('hidden');
        startTimer(10, document.getElementById('timer'), data.withdrawal_id);
      } else {
        alert(data.message);
        if (data.url) {
          window.location.href = data.url;
        }
      }
    }).catch(error => console.error('Error:', error));
  });
  function startTimer(duration, display, withdrawalId) {
    var timer = duration, minutes, seconds;
    var interval = setInterval(function() {
      minutes = parseInt(timer / 60, 10);
      seconds = parseInt(timer % 60, 10);
      minutes = minutes < 10 ? "0" + minutes : minutes;
      seconds = seconds < 10 ? "0" + seconds : seconds;
      display.textContent = minutes + ":" + seconds;
      if (--timer < 0) {
        clearInterval(interval);
        checkWithdrawalProcessed(withdrawalId);
      }
    }, 1000);
  }
  function checkWithdrawalProcessed(withdrawalId) {
    fetch(`{% url 'check_withdrawal_status' withdrawal_id=0 %}`.replace('0', withdrawalId))
      .then(response => response.json())
      .then(data => {
        if (data.processed) {
          alert('Your withdrawal has been processed.');
          window.location.href = data.url;
          document.getElementById('processingMessage').classList.add('hidden');
          document.getElementById('showWithdraw').classList.remove('hidden');
        } else {
          startTimer(20, document.getElementById('timer'), withdrawalId);
        }
      }).catch(error => console.error('Error:', error));
  }
</script>
{% endblock %}
