services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketinghub
      POSTGRES_PASSWORD: marketinghub
      POSTGRES_DB: marketinghub
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketinghub -d marketinghub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    ports:
      - "${WEB_HOST_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://marketinghub:marketinghub@db:5432/marketinghub
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-for-docker}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000,http://localhost:8001,http://127.0.0.1:8001,https://markethub.up.railway.app}
      # Gunicorn bind *inside* the container; must match ports mapping "...:8000". Use WEB_HOST_PORT for the host side only.
      PORT: "8000"
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
  redis_data:
